<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Courier New', monospace">
  <defs>
    <marker id="ax" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="step" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8e44ad"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#0d0f14"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="14" fill="#e8ecf8" font-family="Georgia, serif" font-style="italic">
    R* as a subset of P × X  —  formal grid view
  </text>

  <!-- Grid origin -->
  <!-- X axis: values x ∈ X, columns -->
  <!-- Y axis: stages n ∈ P, rows (increasing downward) -->

  <!-- Grid lines -->
  <g stroke="#1e2330" stroke-width="1">
    <!-- vertical grid -->
    <line x1="140" y1="60" x2="140" y2="460"/>
    <line x1="210" y1="60" x2="210" y2="460"/>
    <line x1="280" y1="60" x2="280" y2="460"/>
    <line x1="350" y1="60" x2="350" y2="460"/>
    <line x1="420" y1="60" x2="420" y2="460"/>
    <line x1="490" y1="60" x2="490" y2="460"/>
    <line x1="560" y1="60" x2="560" y2="460"/>
    <!-- horizontal grid -->
    <line x1="80"  y1="100" x2="610" y2="100"/>
    <line x1="80"  y1="160" x2="610" y2="160"/>
    <line x1="80"  y1="220" x2="610" y2="220"/>
    <line x1="80"  y1="280" x2="610" y2="280"/>
    <line x1="80"  y1="340" x2="610" y2="340"/>
    <line x1="80"  y1="400" x2="610" y2="400"/>
  </g>

  <!-- X axis label row -->
  <g font-size="11" fill="#4a5270" text-anchor="middle">
    <text x="140" y="88">x₀</text>
    <text x="210" y="88">x₁</text>
    <text x="280" y="88">x₂</text>
    <text x="350" y="88">x₃</text>
    <text x="420" y="88">x₄</text>
    <text x="490" y="88">x₅</text>
    <text x="560" y="88">⋯</text>
  </g>
  <text x="340" y="72" text-anchor="middle" font-size="10" fill="#4a5270">values  x ∈ X</text>

  <!-- Y axis label column -->
  <g font-size="11" fill="#4a5270" text-anchor="end">
    <text x="72" y="104">1</text>
    <text x="72" y="164">S(1)</text>
    <text x="72" y="224">S²(1)</text>
    <text x="72" y="284">S³(1)</text>
    <text x="72" y="344">S⁴(1)</text>
    <text x="72" y="404">⋮</text>
  </g>
  <text x="30" y="280" font-size="10" fill="#4a5270" transform="rotate(-90,30,280)" text-anchor="middle">stages  n ∈ P</text>

  <!-- All dots (faint — the whole P×X) -->
  <g fill="#1e2a40" opacity="0.9">
    <circle cx="140" cy="100" r="4"/><circle cx="210" cy="100" r="4"/><circle cx="280" cy="100" r="4"/>
    <circle cx="350" cy="100" r="4"/><circle cx="420" cy="100" r="4"/><circle cx="490" cy="100" r="4"/>

    <circle cx="140" cy="160" r="4"/><circle cx="210" cy="160" r="4"/><circle cx="280" cy="160" r="4"/>
    <circle cx="350" cy="160" r="4"/><circle cx="420" cy="160" r="4"/><circle cx="490" cy="160" r="4"/>

    <circle cx="140" cy="220" r="4"/><circle cx="210" cy="220" r="4"/><circle cx="280" cy="220" r="4"/>
    <circle cx="350" cy="220" r="4"/><circle cx="420" cy="220" r="4"/><circle cx="490" cy="220" r="4"/>

    <circle cx="140" cy="280" r="4"/><circle cx="210" cy="280" r="4"/><circle cx="280" cy="280" r="4"/>
    <circle cx="350" cy="280" r="4"/><circle cx="420" cy="280" r="4"/><circle cx="490" cy="280" r="4"/>

    <circle cx="140" cy="340" r="4"/><circle cx="210" cy="340" r="4"/><circle cx="280" cy="340" r="4"/>
    <circle cx="350" cy="340" r="4"/><circle cx="420" cy="340" r="4"/><circle cx="490" cy="340" r="4"/>

    <circle cx="140" cy="400" r="4"/><circle cx="210" cy="400" r="4"/><circle cx="280" cy="400" r="4"/>
    <circle cx="350" cy="400" r="4"/><circle cx="420" cy="400" r="4"/><circle cx="490" cy="400" r="4"/>
  </g>

  <!-- R* chain: the forced pairs — highlighted strongly -->
  <!-- (1, a)=x₁  at row 1, col x₁=210 -->
  <!-- (S(1), T(a))=x₂ at row S(1), col x₂=280 -->
  <!-- (S²(1), T²(a))=x₃ at row S²(1), col x₃=350 -->
  <!-- etc. -->

  <!-- Highlight cells of R* -->
  <rect x="192" y="82"  width="36" height="36" rx="4" fill="#8e44ad" opacity="0.25"/>
  <rect x="262" y="142" width="36" height="36" rx="4" fill="#8e44ad" opacity="0.25"/>
  <rect x="332" y="202" width="36" height="36" rx="4" fill="#8e44ad" opacity="0.25"/>
  <rect x="402" y="262" width="36" height="36" rx="4" fill="#8e44ad" opacity="0.25"/>
  <rect x="472" y="322" width="36" height="36" rx="4" fill="#8e44ad" opacity="0.25"/>

  <!-- R* dots (prominent) -->
  <circle cx="210" cy="100" r="8" fill="#b57bee" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="280" cy="160" r="8" fill="#b57bee" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="350" cy="220" r="8" fill="#b57bee" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="420" cy="280" r="8" fill="#b57bee" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="490" cy="340" r="8" fill="#b57bee" stroke="#8e44ad" stroke-width="2" opacity="0.7"/>

  <!-- Step arrows between R* nodes -->
  <line x1="218" y1="107" x2="272" y2="153" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#step)"/>
  <line x1="288" y1="167" x2="342" y2="213" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#step)"/>
  <line x1="358" y1="227" x2="412" y2="273" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#step)"/>
  <line x1="428" y1="287" x2="482" y2="333" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#step)"/>

  <!-- Step labels -->
  <text x="249" y="133" font-size="10" fill="#8e44ad" font-style="italic">T</text>
  <text x="319" y="193" font-size="10" fill="#8e44ad" font-style="italic">T</text>
  <text x="389" y="253" font-size="10" fill="#8e44ad" font-style="italic">T</text>
  <text x="459" y="313" font-size="10" fill="#8e44ad" font-style="italic">T</text>

  <!-- Pair labels -->
  <text x="215" y="97"  font-size="9" fill="#d7bff5">(1, a)</text>
  <text x="285" y="157" font-size="9" fill="#d7bff5">(S(1), T(a))</text>
  <text x="355" y="217" font-size="9" fill="#d7bff5">(S²(1), T²(a))</text>
  <text x="425" y="277" font-size="9" fill="#d7bff5">(S³(1), T³(a))</text>

  <!-- R* boundary annotation -->
  <path d="M 185 75 L 185 365 Q 185 375 195 375 L 500 375 Q 510 375 510 365 L 510 75 Q 510 65 500 65 L 195 65 Q 185 65 185 75"
        fill="none" stroke="#8e44ad" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="620" y="220" font-size="11" fill="#8e44ad" text-anchor="middle">R*</text>
  <text x="620" y="234" font-size="9"  fill="#4a5270" text-anchor="middle">⊆ P × X</text>

  <!-- Legend -->
  <rect x="80" y="435" width="500" height="60" rx="6" fill="#13161e" stroke="#1e2330"/>
  <circle cx="110" cy="460" r="7" fill="#b57bee" stroke="#8e44ad" stroke-width="2"/>
  <text x="125" y="464" font-size="10" fill="#c8cfe8">R* pair (forced by recursion)</text>
  <circle cx="110" cy="480" r="4" fill="#1e2a40"/>
  <text x="125" y="484" font-size="10" fill="#4a5270">Pair in P × X but not in R* (excluded by some iterator relation)</text>
  <line x1="310" y1="460" x2="340" y2="460" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#step)"/>
  <text x="348" y="464" font-size="10" fill="#c8cfe8" font-style="italic">T applied once</text>

  <!-- Caption -->
  <text x="340" y="507" text-anchor="middle" font-size="10" fill="#4a5270" font-style="italic">
    Each row has exactly one R* entry (Lemma B1 + B2). The diagonal is the graph of f = Iter(a, T).
  </text>
</svg>
