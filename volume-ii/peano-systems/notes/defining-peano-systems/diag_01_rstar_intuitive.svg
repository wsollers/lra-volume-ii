<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2471a3"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="500" fill="#fafaf7"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="17" font-style="italic" fill="#2c3e50">
    The Minimal Iterator Relation R* inside P × X
  </text>

  <!-- ── PANEL 1: Full P×X ── -->
  <rect x="30" y="60" width="190" height="390" rx="10" fill="#eaf0fb" stroke="#2471a3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="85" text-anchor="middle" font-size="13" fill="#2471a3" font-weight="bold">P × X</text>
  <text x="125" y="100" text-anchor="middle" font-size="10" fill="#555">(all possible pairs)</text>

  <!-- dots grid panel 1 -->
  <g fill="#2471a3" opacity="0.35">
    <circle cx="75"  cy="130" r="5"/><circle cx="105" cy="130" r="5"/><circle cx="135" cy="130" r="5"/><circle cx="165" cy="130" r="5"/><circle cx="195" cy="130" r="5"/>
    <circle cx="75"  cy="170" r="5"/><circle cx="105" cy="170" r="5"/><circle cx="135" cy="170" r="5"/><circle cx="165" cy="170" r="5"/><circle cx="195" cy="170" r="5"/>
    <circle cx="75"  cy="210" r="5"/><circle cx="105" cy="210" r="5"/><circle cx="135" cy="210" r="5"/><circle cx="165" cy="210" r="5"/><circle cx="195" cy="210" r="5"/>
    <circle cx="75"  cy="250" r="5"/><circle cx="105" cy="250" r="5"/><circle cx="135" cy="250" r="5"/><circle cx="165" cy="250" r="5"/><circle cx="195" cy="250" r="5"/>
    <circle cx="75"  cy="290" r="5"/><circle cx="105" cy="290" r="5"/><circle cx="135" cy="290" r="5"/><circle cx="165" cy="290" r="5"/><circle cx="195" cy="290" r="5"/>
    <circle cx="75"  cy="330" r="5"/><circle cx="105" cy="330" r="5"/><circle cx="135" cy="330" r="5"/><circle cx="165" cy="330" r="5"/><circle cx="195" cy="330" r="5"/>
    <circle cx="75"  cy="370" r="5"/><circle cx="105" cy="370" r="5"/><circle cx="135" cy="370" r="5"/><circle cx="165" cy="370" r="5"/><circle cx="195" cy="370" r="5"/>
  </g>
  <!-- axis labels panel 1 -->
  <text x="55"  y="134" font-size="9" fill="#555">1</text>
  <text x="55"  y="174" font-size="9" fill="#555">S(1)</text>
  <text x="55"  y="214" font-size="9" fill="#555">S²(1)</text>
  <text x="55"  y="254" font-size="9" fill="#555">S³(1)</text>
  <text x="55"  y="294" font-size="9" fill="#555">⋮</text>
  <text x="35" y="430" font-size="10" fill="#2471a3">stages n ∈ P</text>
  <text x="155" y="460" font-size="10" fill="#2471a3">values x ∈ X</text>

  <!-- ── PANEL 2: One iterator relation (junk included) ── -->
  <rect x="260" y="60" width="190" height="390" rx="10" fill="#eafbea" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="355" y="85" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">One iterator relation R</text>
  <text x="355" y="100" text-anchor="middle" font-size="10" fill="#555">(forced chain + junk)</text>

  <!-- junk dots -->
  <g fill="#27ae60" opacity="0.22">
    <circle cx="305" cy="130" r="5"/><circle cx="365" cy="130" r="5"/><circle cx="425" cy="130" r="5"/>
    <circle cx="305" cy="170" r="5"/><circle cx="335" cy="170" r="5"/><circle cx="425" cy="170" r="5"/>
    <circle cx="305" cy="210" r="5"/><circle cx="395" cy="210" r="5"/><circle cx="425" cy="210" r="5"/>
    <circle cx="305" cy="250" r="5"/><circle cx="335" cy="250" r="5"/>
    <circle cx="305" cy="290" r="5"/><circle cx="395" cy="290" r="5"/>
    <circle cx="305" cy="330" r="5"/>
    <circle cx="305" cy="370" r="5"/><circle cx="365" cy="370" r="5"/>
  </g>
  <!-- forced chain in panel 2 -->
  <circle cx="335" cy="130" r="7" fill="#c0392b"/>
  <circle cx="365" cy="170" r="7" fill="#c0392b"/>
  <circle cx="395" cy="210" r="7" fill="#c0392b"/>
  <circle cx="425" cy="250" r="7" fill="#c0392b"/>
  <circle cx="425" cy="290" r="7" fill="#c0392b" opacity="0.6"/>
  <!-- chain arrows panel 2 -->
  <line x1="338" y1="136" x2="361" y2="164" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="368" y1="176" x2="391" y2="204" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="398" y1="216" x2="422" y2="244" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- labels -->
  <text x="320" y="126" font-size="9" fill="#c0392b">(1,a)</text>
  <text x="350" y="166" font-size="9" fill="#c0392b">(S(1),T(a))</text>

  <!-- ── PANEL 3: R* only ── -->
  <rect x="490" y="60" width="200" height="390" rx="10" fill="#fdf2f8" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="85" text-anchor="middle" font-size="13" fill="#8e44ad" font-weight="bold">R* = ⋂ (all R)</text>
  <text x="590" y="100" text-anchor="middle" font-size="10" fill="#555">(only forced pairs remain)</text>

  <!-- R* chain pairs — prominent -->
  <circle cx="540" cy="130" r="9" fill="#8e44ad"/>
  <circle cx="564" cy="170" r="9" fill="#8e44ad"/>
  <circle cx="588" cy="210" r="9" fill="#8e44ad"/>
  <circle cx="612" cy="250" r="9" fill="#8e44ad"/>
  <circle cx="636" cy="290" r="9" fill="#8e44ad" opacity="0.65"/>
  <text x="620" y="310" font-size="11" fill="#8e44ad">⋮</text>

  <!-- labels R* -->
  <text x="494" y="127" font-size="9" fill="#8e44ad" font-weight="bold">(1, a)</text>
  <text x="494" y="167" font-size="9" fill="#8e44ad" font-weight="bold">(S(1), T(a))</text>
  <text x="494" y="207" font-size="9" fill="#8e44ad" font-weight="bold">(S²(1), T²(a))</text>
  <text x="494" y="247" font-size="9" fill="#8e44ad" font-weight="bold">(S³(1), T³(a))</text>

  <!-- T-step arrows R* -->
  <line x1="545" y1="138" x2="559" y2="162" stroke="#8e44ad" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="569" y1="178" x2="583" y2="202" stroke="#8e44ad" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="593" y1="218" x2="607" y2="242" stroke="#8e44ad" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="617" y1="258" x2="631" y2="282" stroke="#8e44ad" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- T-step labels -->
  <text x="666" y="152" font-size="9" fill="#8e44ad" font-style="italic">T</text>
  <text x="666" y="192" font-size="9" fill="#8e44ad" font-style="italic">T</text>
  <text x="666" y="232" font-size="9" fill="#8e44ad" font-style="italic">T</text>

  <!-- Intersection arrows between panels -->
  <text x="240" y="265" text-anchor="middle" font-size="18" fill="#aaa">∩</text>
  <text x="468" y="265" text-anchor="middle" font-size="18" fill="#aaa">∩</text>
  <text x="222" y="270" font-size="9" fill="#aaa">⋯</text>

  <!-- Bottom caption -->
  <text x="360" y="478" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    The intersection kills every pair not forced by the recursion. Only the chain (1,a) → (S(1),T(a)) → ⋯ survives in R*.
  </text>
</svg>
