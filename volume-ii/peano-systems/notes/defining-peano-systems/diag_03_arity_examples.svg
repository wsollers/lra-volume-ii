<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="Georgia, serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#27ae60"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e67e22"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c0392b"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2471a3"/>
    </marker>
  </defs>

  <rect width="760" height="560" fill="#fafaf7"/>

  <!-- ════════════════════════════════ -->
  <!--  PANEL 1 — UNARY: isOdd         -->
  <!-- ════════════════════════════════ -->
  <rect x="20" y="20" width="215" height="500" rx="10" fill="#eafbea" stroke="#27ae60" stroke-width="1.5"/>
  <text x="127" y="46" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">Unary Iterator</text>
  <text x="127" y="62" text-anchor="middle" font-size="11" fill="#555" font-style="italic">isOdd : P → {F, T}</text>

  <!-- Config box -->
  <rect x="35" y="72" width="185" height="72" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="127" y="90"  text-anchor="middle" font-size="10" fill="#333">W = {false, true}</text>
  <text x="127" y="106" text-anchor="middle" font-size="10" fill="#333">c = true</text>
  <text x="127" y="122" text-anchor="middle" font-size="10" fill="#333">T = λx. ¬x</text>
  <text x="127" y="138" text-anchor="middle" font-size="9"  fill="#888">No fixed left input</text>

  <!-- Trace -->
  <g font-size="11" fill="#333">
    <text x="45"  y="172">n = 1</text>
    <text x="45"  y="210">n = 2</text>
    <text x="45"  y="248">n = 3</text>
    <text x="45"  y="286">n = 4</text>
    <text x="45"  y="324">n = 5</text>
  </g>

  <!-- Value bubbles -->
  <g text-anchor="middle" font-size="11" font-weight="bold">
    <circle cx="170" cy="166" r="18" fill="#27ae60"/>
    <text x="170" y="170" fill="white">T</text>
    <circle cx="170" cy="204" r="18" fill="#888"/>
    <text x="170" y="208" fill="white">F</text>
    <circle cx="170" cy="242" r="18" fill="#27ae60"/>
    <text x="170" y="246" fill="white">T</text>
    <circle cx="170" cy="280" r="18" fill="#888"/>
    <text x="170" y="284" fill="white">F</text>
    <circle cx="170" cy="318" r="18" fill="#27ae60"/>
    <text x="170" y="322" fill="white">T</text>
  </g>

  <!-- Step arrows + T labels -->
  <line x1="170" y1="184" x2="170" y2="186" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="170" y1="222" x2="170" y2="224" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="170" y1="260" x2="170" y2="262" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="170" y1="298" x2="170" y2="300" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a1)"/>
  <g font-size="9" fill="#27ae60" font-style="italic">
    <text x="185" y="198">¬</text>
    <text x="185" y="236">¬</text>
    <text x="185" y="274">¬</text>
    <text x="185" y="312">¬</text>
  </g>

  <!-- Clause box -->
  <rect x="35" y="345" width="185" height="60" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="127" y="363" text-anchor="middle" font-size="10" fill="#333">f(1) = true</text>
  <text x="127" y="381" text-anchor="middle" font-size="10" fill="#333">f(S(n)) = ¬f(n)</text>
  <text x="127" y="398" text-anchor="middle" font-size="9" fill="#888">One invocation of PIT</text>

  <!-- Key insight -->
  <rect x="35" y="418" width="185" height="82" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="127" y="436" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Key: W need not be P</text>
  <text x="127" y="452" text-anchor="middle" font-size="9" fill="#555">Target set is {F,T}.</text>
  <text x="127" y="466" text-anchor="middle" font-size="9" fill="#555">Iterator theorem fires</text>
  <text x="127" y="480" text-anchor="middle" font-size="9" fill="#555">for any W, c, T.</text>
  <text x="127" y="494" text-anchor="middle" font-size="9" fill="#888">Zero fixed inputs.</text>

  <!-- ════════════════════════════════ -->
  <!--  PANEL 2 — BINARY: addition     -->
  <!-- ════════════════════════════════ -->
  <rect x="270" y="20" width="215" height="500" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="377" y="46" text-anchor="middle" font-size="13" fill="#e67e22" font-weight="bold">Binary Iterator</text>
  <text x="377" y="62" text-anchor="middle" font-size="11" fill="#555" font-style="italic">2 + n  (fix m = 2)</text>

  <!-- Config box -->
  <rect x="285" y="72" width="185" height="72" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1"/>
  <text x="377" y="90"  text-anchor="middle" font-size="10" fill="#333">W = P</text>
  <text x="377" y="106" text-anchor="middle" font-size="10" fill="#333">c = S(2) = 3</text>
  <text x="377" y="122" text-anchor="middle" font-size="10" fill="#333">T = S (successor)</text>
  <text x="377" y="138" text-anchor="middle" font-size="9"  fill="#888">One fixed left input m</text>

  <!-- Trace -->
  <g font-size="11" fill="#333">
    <text x="295" y="172">n = 1</text>
    <text x="295" y="210">n = 2</text>
    <text x="295" y="248">n = 3</text>
    <text x="295" y="286">n = 4</text>
    <text x="295" y="324">n = 5</text>
  </g>

  <!-- Value bubbles -->
  <g text-anchor="middle" font-size="11" font-weight="bold">
    <circle cx="420" cy="166" r="18" fill="#e67e22"/>
    <text x="420" y="170" fill="white">3</text>
    <circle cx="420" cy="204" r="18" fill="#e67e22"/>
    <text x="420" y="208" fill="white">4</text>
    <circle cx="420" cy="242" r="18" fill="#e67e22"/>
    <text x="420" y="246" fill="white">5</text>
    <circle cx="420" cy="280" r="18" fill="#e67e22"/>
    <text x="420" y="284" fill="white">6</text>
    <circle cx="420" cy="318" r="18" fill="#e67e22"/>
    <text x="420" y="322" fill="white">7</text>
  </g>

  <!-- Step arrows -->
  <line x1="420" y1="184" x2="420" y2="186" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="420" y1="222" x2="420" y2="224" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="420" y1="260" x2="420" y2="262" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="420" y1="298" x2="420" y2="300" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a2)"/>
  <g font-size="9" fill="#e67e22" font-style="italic">
    <text x="435" y="198">S</text>
    <text x="435" y="236">S</text>
    <text x="435" y="274">S</text>
    <text x="435" y="312">S</text>
  </g>

  <!-- Clause box -->
  <rect x="285" y="345" width="185" height="60" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1"/>
  <text x="377" y="363" text-anchor="middle" font-size="10" fill="#333">f_m(1) = S(m)</text>
  <text x="377" y="381" text-anchor="middle" font-size="10" fill="#333">f_m(S(n)) = S(f_m(n))</text>
  <text x="377" y="398" text-anchor="middle" font-size="9" fill="#888">One invocation per fixed m</text>

  <!-- Key insight -->
  <rect x="285" y="418" width="185" height="82" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="377" y="436" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="bold">Key: m baked into c</text>
  <text x="377" y="452" text-anchor="middle" font-size="9" fill="#555">Left input m fixes start.</text>
  <text x="377" y="466" text-anchor="middle" font-size="9" fill="#555">Right input n counts</text>
  <text x="377" y="480" text-anchor="middle" font-size="9" fill="#555">T-steps applied.</text>
  <text x="377" y="494" text-anchor="middle" font-size="9" fill="#888">One fixed input.</text>

  <!-- ════════════════════════════════ -->
  <!--  PANEL 3 — TERNARY: tetration   -->
  <!-- ════════════════════════════════ -->
  <rect x="520" y="20" width="215" height="500" rx="10" fill="#fdedec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="627" y="46" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">Ternary Iterator</text>
  <text x="627" y="62" text-anchor="middle" font-size="11" fill="#555" font-style="italic">2↑↑n  (tetration, fix m=2)</text>

  <!-- Config box -->
  <rect x="535" y="72" width="185" height="72" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
  <text x="627" y="90"  text-anchor="middle" font-size="10" fill="#333">W = P</text>
  <text x="627" y="106" text-anchor="middle" font-size="10" fill="#333">c = m = 2</text>
  <text x="627" y="122" text-anchor="middle" font-size="10" fill="#333">T = λx. m^x = 2^x</text>
  <text x="627" y="138" text-anchor="middle" font-size="9"  fill="#888">Two fixed inputs m, base</text>

  <!-- Trace -->
  <g font-size="11" fill="#333">
    <text x="545" y="172">n = 1</text>
    <text x="545" y="210">n = 2</text>
    <text x="545" y="248">n = 3</text>
    <text x="545" y="286">n = 4</text>
    <text x="545" y="324">n = 5</text>
  </g>

  <!-- Value bubbles -->
  <g text-anchor="middle" font-size="10" font-weight="bold">
    <circle cx="670" cy="166" r="18" fill="#c0392b"/>
    <text x="670" y="170" fill="white">2</text>
    <circle cx="670" cy="204" r="18" fill="#c0392b"/>
    <text x="670" y="208" fill="white">4</text>
    <circle cx="670" cy="242" r="18" fill="#c0392b"/>
    <text x="670" y="246" fill="white">16</text>
    <circle cx="670" cy="280" r="18" fill="#c0392b"/>
    <text x="670" y="284" fill="white">65536</text>
    <circle cx="670" cy="318" r="18" fill="#c0392b" opacity="0.6"/>
    <text x="670" y="322" fill="white" font-size="8">2^65536</text>
  </g>

  <!-- Step arrows -->
  <line x1="670" y1="184" x2="670" y2="186" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="670" y1="222" x2="670" y2="224" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="670" y1="260" x2="670" y2="262" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="670" y1="298" x2="670" y2="300" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a3)"/>
  <g font-size="9" fill="#c0392b" font-style="italic">
    <text x="685" y="198">2^x</text>
    <text x="685" y="236">2^x</text>
    <text x="685" y="274">2^x</text>
    <text x="685" y="312">2^x</text>
  </g>

  <!-- Clause box -->
  <rect x="535" y="345" width="185" height="60" rx="6" fill="#fff" stroke="#c0392b" stroke-width="1"/>
  <text x="627" y="363" text-anchor="middle" font-size="10" fill="#333">f(1) = m</text>
  <text x="627" y="381" text-anchor="middle" font-size="10" fill="#333">f(S(n)) = m^f(n)</text>
  <text x="627" y="398" text-anchor="middle" font-size="9" fill="#888">2 ↑↑ n = tower of n 2s</text>

  <!-- Key insight -->
  <rect x="535" y="418" width="185" height="82" rx="6" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="627" y="436" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">Key: same machine</text>
  <text x="627" y="452" text-anchor="middle" font-size="9" fill="#555">T = (x ↦ m^x) uses</text>
  <text x="627" y="466" text-anchor="middle" font-size="9" fill="#555">exponentiation already</text>
  <text x="627" y="480" text-anchor="middle" font-size="9" fill="#555">proved. Dependency: exp.</text>
  <text x="627" y="494" text-anchor="middle" font-size="9" fill="#888">Two fixed inputs.</text>

  <!-- Bottom caption row -->
  <text x="380" y="537" text-anchor="middle" font-size="10" fill="#888" font-style="italic">
    All three are configurations of (W, c, T). The arity of the output operation = number of fixed inputs.
  </text>
</svg>
