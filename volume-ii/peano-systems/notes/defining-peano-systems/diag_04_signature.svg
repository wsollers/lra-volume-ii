<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 520" font-family="'Courier New', monospace">
  <rect width="740" height="520" fill="#0d0f14"/>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="16"
        font-style="italic" fill="#e8ecf8">
    Model-Theoretic Signature  Σ = (P; 1; S, +, ·, ^)
  </text>

  <!-- ── SORTS ── -->
  <rect x="30" y="50" width="680" height="52" rx="8" fill="#13161e" stroke="#1e2330"/>
  <text x="50" y="72" font-size="11" fill="#5b8dee">SORT</text>
  <text x="120" y="72" font-size="11" fill="#c8cfe8">P</text>
  <text x="145" y="72" font-size="11" fill="#4a5270">—  the carrier set  (the Peano system)</text>
  <text x="50" y="90" font-size="10" fill="#4a5270">
    One sort only. All function symbols have domain and codomain in P.
  </text>

  <!-- ── CONSTANTS ── -->
  <rect x="30" y="114" width="680" height="52" rx="8" fill="#13161e" stroke="#1e2330"/>
  <text x="50" y="136" font-size="11" fill="#5b8dee">CONSTANT</text>
  <text x="155" y="136" font-size="11" fill="#e8b44a">1 : P</text>
  <text x="230" y="136" font-size="11" fill="#4a5270">—  the distinguished initial element</text>
  <text x="50" y="154" font-size="10" fill="#4a5270">
    Axiom: 1 ∉ rng(S)     (1 is not a successor)
  </text>

  <!-- ── FUNCTION SYMBOLS ── -->
  <rect x="30" y="178" width="680" height="170" rx="8" fill="#13161e" stroke="#1e2330"/>
  <text x="50" y="200" font-size="11" fill="#5b8dee">FUNCTION SYMBOLS</text>

  <!-- Table header -->
  <line x1="50" y1="208" x2="695" y2="208" stroke="#1e2330"/>
  <text x="55"  y="222" font-size="9" fill="#4a5270">Symbol</text>
  <text x="120" y="222" font-size="9" fill="#4a5270">Type</text>
  <text x="220" y="222" font-size="9" fill="#4a5270">Arity</text>
  <text x="290" y="222" font-size="9" fill="#4a5270">Base clause</text>
  <text x="450" y="222" font-size="9" fill="#4a5270">Successor clause</text>
  <line x1="50" y1="226" x2="695" y2="226" stroke="#1e2330"/>

  <!-- S row -->
  <text x="55"  y="244" font-size="10" fill="#4ae8a0">S</text>
  <text x="120" y="244" font-size="10" fill="#c8cfe8">P → P</text>
  <text x="220" y="244" font-size="10" fill="#c8cfe8">1</text>
  <text x="290" y="244" font-size="10" fill="#c8cfe8">—</text>
  <text x="450" y="244" font-size="10" fill="#c8cfe8">S(n) ≠ S(m) → n ≠ m  (injective)</text>

  <!-- + row -->
  <text x="55"  y="264" font-size="10" fill="#4ae8a0">+</text>
  <text x="120" y="264" font-size="10" fill="#c8cfe8">P × P → P</text>
  <text x="220" y="264" font-size="10" fill="#c8cfe8">2</text>
  <text x="290" y="264" font-size="10" fill="#c8cfe8">m + 1 = S(m)</text>
  <text x="450" y="264" font-size="10" fill="#c8cfe8">m + S(n) = S(m + n)</text>

  <!-- · row -->
  <text x="55"  y="284" font-size="10" fill="#4ae8a0">·</text>
  <text x="120" y="284" font-size="10" fill="#c8cfe8">P × P → P</text>
  <text x="220" y="284" font-size="10" fill="#c8cfe8">2</text>
  <text x="290" y="284" font-size="10" fill="#c8cfe8">m · 1 = m</text>
  <text x="450" y="284" font-size="10" fill="#c8cfe8">m · S(n) = (m · n) + m</text>

  <!-- ^ row -->
  <text x="55"  y="304" font-size="10" fill="#4ae8a0">^</text>
  <text x="120" y="304" font-size="10" fill="#c8cfe8">P × P → P</text>
  <text x="220" y="304" font-size="10" fill="#c8cfe8">2</text>
  <text x="290" y="304" font-size="10" fill="#c8cfe8">m ^ 1 = m</text>
  <text x="450" y="304" font-size="10" fill="#c8cfe8">m ^ S(n) = (m ^ n) · m</text>

  <!-- dependency chain -->
  <text x="55" y="335" font-size="9" fill="#4a5270">Dependency:</text>
  <text x="140" y="335" font-size="9" fill="#4ae8a0">S  (primitive)</text>
  <text x="250" y="335" font-size="9" fill="#4a5270">→</text>
  <text x="270" y="335" font-size="9" fill="#4ae8a0">+</text>
  <text x="290" y="335" font-size="9" fill="#4a5270">→</text>
  <text x="310" y="335" font-size="9" fill="#4ae8a0">·</text>
  <text x="330" y="335" font-size="9" fill="#4a5270">→</text>
  <text x="350" y="335" font-size="9" fill="#4ae8a0">^</text>
  <text x="370" y="335" font-size="9" fill="#4a5270">  (each step rule uses the previous operation)</text>

  <!-- ── AXIOMS ── -->
  <rect x="30" y="360" width="330" height="130" rx="8" fill="#13161e" stroke="#1e2330"/>
  <text x="50" y="382" font-size="11" fill="#5b8dee">PEANO AXIOMS  (for S and 1)</text>
  <text x="50" y="400" font-size="10" fill="#c8cfe8">P1:  1 ∈ P</text>
  <text x="50" y="418" font-size="10" fill="#c8cfe8">P2:  S : P → P</text>
  <text x="50" y="436" font-size="10" fill="#c8cfe8">P3:  1 ∉ rng(S)</text>
  <text x="50" y="454" font-size="10" fill="#c8cfe8">P4:  S injective</text>
  <text x="50" y="472" font-size="10" fill="#c8cfe8">P5:  Induction  (second-order)</text>

  <!-- ── ALGEBRAIC LAWS (forthcoming) ── -->
  <rect x="380" y="360" width="330" height="130" rx="8" fill="#13161e" stroke="#1e2330"/>
  <text x="400" y="382" font-size="11" fill="#5b8dee">ALGEBRAIC LAWS  (to be proved)</text>
  <text x="400" y="400" font-size="10" fill="#4a5270">Commutativity:    m + n = n + m</text>
  <text x="400" y="418" font-size="10" fill="#4a5270">Associativity:    (m+n)+k = m+(n+k)</text>
  <text x="400" y="436" font-size="10" fill="#4a5270">Distributivity:   m·(n+k) = m·n + m·k</text>
  <text x="400" y="454" font-size="10" fill="#4a5270">Cancellation:     m+k=n+k → m=n</text>
  <text x="400" y="472" font-size="10" fill="#4a5270">Exp laws:         m^(n+k) = m^n · m^k</text>

  <!-- ── CATEGORICITY ── -->
  <rect x="30" y="500" width="680" height="16" rx="4" fill="#1a2340"/>
  <text x="370" y="512" text-anchor="middle" font-size="9" fill="#5b8dee">
    Categoricity: any two Σ-structures satisfying P1–P5 are uniquely isomorphic  (Uniqueness of Peano Systems up to Isomorphism)
  </text>
</svg>
