<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="Georgia, serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="arr-s" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2471a3"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#8e44ad"/>
    </marker>
    <marker id="arr-f" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arr-f-dim" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c0392b" opacity="0.4"/>
    </marker>
    <marker id="arr-brace" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#555"/>
    </marker>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="780" height="580" fill="#fafaf8"/>

  <!-- ── Title ── -->
  <text x="390" y="32" text-anchor="middle" font-size="16"
        font-style="italic" fill="#2c3e50">
    The Peano Iterator — Two Parallel Chains
  </text>
  <text x="390" y="50" text-anchor="middle" font-size="11" fill="#888">
    S advances stages in P · g advances values in W · F bridges the two chains
  </text>

  <!-- ══════════════════════════════════════════════════ -->
  <!--  LEFT COLUMN — P (stages)                         -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- Column background -->
  <rect x="60" y="65" width="160" height="460" rx="12"
        fill="#eaf4fb" stroke="#2471a3" stroke-width="1.5"/>

  <!-- Column header -->
  <text x="140" y="90" text-anchor="middle" font-size="14"
        font-weight="bold" fill="#2471a3">P</text>
  <text x="140" y="106" text-anchor="middle" font-size="10"
        fill="#4a7fa5">Peano system  (P, S, 1)</text>
  <text x="140" y="120" text-anchor="middle" font-size="10"
        fill="#4a7fa5">stages  n ∈ P</text>

  <!-- Stage nodes -->
  <!-- Stage 1 -->
  <circle cx="140" cy="165" r="22" fill="#2471a3" stroke="#1a5276" stroke-width="2"/>
  <text x="140" y="161" text-anchor="middle" font-size="11" fill="white" font-weight="bold">1</text>
  <text x="140" y="174" text-anchor="middle" font-size="8" fill="#aed6f1">base</text>

  <!-- Stage S(1) -->
  <circle cx="140" cy="255" r="22" fill="#2471a3" stroke="#1a5276" stroke-width="2"/>
  <text x="140" y="249" text-anchor="middle" font-size="10" fill="white" font-weight="bold">S(1)</text>
  <text x="140" y="262" text-anchor="middle" font-size="8" fill="#aed6f1">= 2</text>

  <!-- Stage S²(1) -->
  <circle cx="140" cy="345" r="22" fill="#2471a3" stroke="#1a5276" stroke-width="2"/>
  <text x="140" y="339" text-anchor="middle" font-size="9" fill="white" font-weight="bold">S²(1)</text>
  <text x="140" y="352" text-anchor="middle" font-size="8" fill="#aed6f1">= 3</text>

  <!-- Stage S³(1) -->
  <circle cx="140" cy="435" r="22" fill="#2471a3" stroke="#1a5276" stroke-width="2" opacity="0.7"/>
  <text x="140" y="429" text-anchor="middle" font-size="9" fill="white" font-weight="bold">S³(1)</text>
  <text x="140" y="442" text-anchor="middle" font-size="8" fill="#aed6f1">= 4</text>

  <!-- Ellipsis -->
  <text x="140" y="494" text-anchor="middle" font-size="20" fill="#2471a3" opacity="0.5">⋮</text>

  <!-- S arrows within P column -->
  <line x1="140" y1="188" x2="140" y2="232"
        stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-s)"/>
  <line x1="140" y1="278" x2="140" y2="322"
        stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-s)"/>
  <line x1="140" y1="368" x2="140" y2="412"
        stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-s)" opacity="0.7"/>

  <!-- S labels -->
  <text x="108" y="214" font-size="12" fill="#2471a3" font-style="italic">S</text>
  <text x="108" y="304" font-size="12" fill="#2471a3" font-style="italic">S</text>
  <text x="108" y="394" font-size="12" fill="#2471a3" font-style="italic" opacity="0.7">S</text>

  <!-- S domain/codomain annotation -->
  <text x="75" y="150" font-size="9" fill="#2471a3">dom(S) = P</text>
  <text x="75" y="162" font-size="9" fill="#2471a3">rng(S) ⊆ P</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!--  RIGHT COLUMN — W (values)                        -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- Column background -->
  <rect x="560" y="65" width="180" height="460" rx="12"
        fill="#f5eefb" stroke="#8e44ad" stroke-width="1.5"/>

  <!-- Column header -->
  <text x="650" y="90" text-anchor="middle" font-size="14"
        font-weight="bold" fill="#8e44ad">W</text>
  <text x="650" y="106" text-anchor="middle" font-size="10"
        fill="#7d3c98">target set  (arbitrary)</text>
  <text x="650" y="120" text-anchor="middle" font-size="10"
        fill="#7d3c98">values  x ∈ W</text>

  <!-- Value nodes -->
  <!-- c = F(1) -->
  <circle cx="650" cy="165" r="22" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="650" y="161" text-anchor="middle" font-size="12" fill="white" font-weight="bold">c</text>
  <text x="650" y="174" text-anchor="middle" font-size="8" fill="#d7bff5">= a</text>

  <!-- g(c) = F(S(1)) -->
  <circle cx="650" cy="255" r="22" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="650" y="249" text-anchor="middle" font-size="10" fill="white" font-weight="bold">g(c)</text>
  <text x="650" y="262" text-anchor="middle" font-size="8" fill="#d7bff5">= T(a)</text>

  <!-- g²(c) = F(S²(1)) -->
  <circle cx="650" cy="345" r="22" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="650" y="337" text-anchor="middle" font-size="9" fill="white" font-weight="bold">g²(c)</text>
  <text x="650" y="350" text-anchor="middle" font-size="8" fill="#d7bff5">= T²(a)</text>

  <!-- g³(c) = F(S³(1)) -->
  <circle cx="650" cy="435" r="22" fill="#8e44ad" stroke="#6c3483" stroke-width="2" opacity="0.7"/>
  <text x="650" y="427" text-anchor="middle" font-size="9" fill="white" font-weight="bold">g³(c)</text>
  <text x="650" y="440" text-anchor="middle" font-size="8" fill="#d7bff5" opacity="0.8">= T³(a)</text>

  <!-- Ellipsis -->
  <text x="650" y="494" text-anchor="middle" font-size="20" fill="#8e44ad" opacity="0.5">⋮</text>

  <!-- g arrows within W column -->
  <line x1="650" y1="188" x2="650" y2="232"
        stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <line x1="650" y1="278" x2="650" y2="322"
        stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <line x1="650" y1="368" x2="650" y2="412"
        stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arr-g)" opacity="0.7"/>

  <!-- g labels -->
  <text x="664" y="214" font-size="12" fill="#8e44ad" font-style="italic">g</text>
  <text x="664" y="304" font-size="12" fill="#8e44ad" font-style="italic">g</text>
  <text x="664" y="394" font-size="12" fill="#8e44ad" font-style="italic" opacity="0.7">g</text>

  <!-- g domain/codomain annotation -->
  <text x="672" y="150" font-size="9" fill="#8e44ad">dom(g) = W</text>
  <text x="672" y="162" font-size="9" fill="#8e44ad">rng(g) ⊆ W</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!--  F ARROWS — horizontal bridges P → W             -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- F(1) = c -->
  <line x1="163" y1="165" x2="625" y2="165"
        stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7,4"
        marker-end="url(#arr-f)"/>

  <!-- F(S(1)) = g(c) -->
  <line x1="163" y1="255" x2="625" y2="255"
        stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7,4"
        marker-end="url(#arr-f)"/>

  <!-- F(S²(1)) = g²(c) -->
  <line x1="163" y1="345" x2="625" y2="345"
        stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7,4"
        marker-end="url(#arr-f)"/>

  <!-- F(S³(1)) = g³(c) -->
  <line x1="163" y1="435" x2="625" y2="435"
        stroke="#c0392b" stroke-width="2.5" stroke-dasharray="7,4"
        marker-end="url(#arr-f)" opacity="0.5"/>

  <!-- F labels on arrows -->
  <text x="390" y="157" text-anchor="middle" font-size="11"
        fill="#c0392b" font-style="italic">F</text>
  <text x="390" y="247" text-anchor="middle" font-size="11"
        fill="#c0392b" font-style="italic">F</text>
  <text x="390" y="337" text-anchor="middle" font-size="11"
        fill="#c0392b" font-style="italic">F</text>

  <!-- F clause labels -->
  <rect x="270" y="140" width="240" height="20" rx="4" fill="#fdf5f5"/>
  <text x="390" y="154" text-anchor="middle" font-size="10" fill="#c0392b">
    F(1) = c   [clause a — base]
  </text>

  <rect x="270" y="230" width="240" height="20" rx="4" fill="#fdf5f5"/>
  <text x="390" y="244" text-anchor="middle" font-size="10" fill="#c0392b">
    F(S(1)) = g(F(1)) = g(c)   [clause b]
  </text>

  <rect x="248" y="320" width="284" height="20" rx="4" fill="#fdf5f5"/>
  <text x="390" y="334" text-anchor="middle" font-size="10" fill="#c0392b">
    F(S²(1)) = g(F(S(1))) = g²(c)   [clause b]
  </text>

  <!-- ══════════════════════════════════════════════════ -->
  <!--  COMMUTATIVITY CALLOUT                            -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- Square showing F ∘ S = g ∘ F -->
  <rect x="268" y="370" width="264" height="110" rx="8"
        fill="#fffdf0" stroke="#e8b44a" stroke-width="1.5"/>
  <text x="400" y="390" text-anchor="middle" font-size="11"
        fill="#b7770d" font-weight="bold">Commutativity condition</text>

  <text x="400" y="410" text-anchor="middle" font-size="12"
        fill="#555" font-style="italic">F ∘ S  =  g ∘ F</text>

  <text x="400" y="430" text-anchor="middle" font-size="10" fill="#888">
    i.e.  F(S(x)) = g(F(x))  for all x ∈ P
  </text>
  <text x="400" y="448" text-anchor="middle" font-size="10" fill="#888">
    S moves one step in P  ⟺  g moves one step in W
  </text>
  <text x="400" y="466" text-anchor="middle" font-size="10" fill="#b7770d">
    The two chains run in perfect parallel.
  </text>

  <!-- ══════════════════════════════════════════════════ -->
  <!--  LEGEND                                           -->
  <!-- ══════════════════════════════════════════════════ -->

  <rect x="60" y="536" width="660" height="36" rx="6"
        fill="#f0f0ee" stroke="#ccc"/>

  <!-- S legend -->
  <line x1="90" y1="554" x2="120" y2="554"
        stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-s)"/>
  <text x="126" y="558" font-size="10" fill="#2471a3">S : P → P  (successor, injective)</text>

  <!-- g legend -->
  <line x1="310" y1="554" x2="340" y2="554"
        stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="346" y="558" font-size="10" fill="#8e44ad">g : W → W  (step rule, arbitrary)</text>

  <!-- F legend -->
  <line x1="520" y1="554" x2="550" y2="554"
        stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,3"
        marker-end="url(#arr-f)"/>
  <text x="556" y="558" font-size="10" fill="#c0392b">F : P → W  (iterator function)</text>

  <!-- domain/codomain summary box -->
  <rect x="268" y="490" width="264" height="36" rx="6"
        fill="#f8f4ff" stroke="#8e44ad" stroke-width="1"/>
  <text x="400" y="505" text-anchor="middle" font-size="9" fill="#555">
    dom(F) = P  ·  rng(F) ⊆ W
  </text>
  <text x="400" y="520" text-anchor="middle" font-size="9" fill="#555">
    F is a function  ⟺  exactly one value in W per stage in P
  </text>

</svg>
