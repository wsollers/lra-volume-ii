name: Sync volume-ii to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-ii/**'
      - 'bibliography/volume-ii-number-systems.bib'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-ii
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Validate volume bibliography
        run: |
          cd source
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Validate volume
        run: |
          cd source
          python scripts/build_volume.py --validate-only

      - name: Sync volume-ii/ into monorepo
        run: |
          rsync -av --delete source/volume-ii/ monorepo/volume-ii/

      - name: Sync volume-ii bibliography into monorepo
        run: |
          mkdir -p monorepo/bibliography
          cp source/bibliography/volume-ii-number-systems.bib monorepo/bibliography/volume-ii-number-systems.bib

      - name: Commit and push if changed
        run: |
          cd monorepo
          git config user.name  "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-ii/ bibliography/volume-ii-number-systems.bib
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-ii from lra-volume-ii"
          git push
